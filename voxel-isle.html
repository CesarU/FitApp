<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Voxel Isle</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #8fd0ff; overflow: hidden; overscroll-behavior: none;
    touch-action: none; -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #game { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  #hud { position: fixed; inset: 0; pointer-events: none; }

  .zone { position: absolute; top: 0; bottom: 0; pointer-events: auto; z-index: 1; }
  #joystickZone { left: 0; width: 46%; }
  #lookZone { right: 0; width: 54%; }

  #joystickBase {
    position: absolute; left: calc(7vw + env(safe-area-inset-left));
    bottom: calc(11vh + env(safe-area-inset-bottom));
    width: 112px; height: 112px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5);
    pointer-events: none;
  }
  #joystickKnob {
    position: absolute; left: 50%; top: 50%; width: 48px; height: 48px;
    border-radius: 50%; background: rgba(255,255,255,0.55);
    border: 2px solid rgba(255,255,255,0.85);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  #jumpBtn {
    position: absolute; left: calc(7vw + env(safe-area-inset-left) + 128px);
    bottom: calc(13vh + env(safe-area-inset-bottom));
    width: 62px; height: 62px; border-radius: 50%;
    background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff; pointer-events: auto; z-index: 2;
  }

  #mineBtn, #placeBtn {
    position: absolute; width: 68px; height: 68px; border-radius: 50%;
    background: rgba(0,0,0,0.35); border: 2px solid rgba(255,255,255,0.65);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; pointer-events: auto; z-index: 2; color:#fff;
  }
  #mineBtn { right: calc(6vw + env(safe-area-inset-right)); bottom: calc(21vh + env(safe-area-inset-bottom)); }
  #placeBtn { right: calc(6vw + env(safe-area-inset-right) + 84px); bottom: calc(13vh + env(safe-area-inset-bottom)); }

  #crosshair {
    position: absolute; left: 50%; top: 50%; width: 22px; height: 22px;
    margin: -11px 0 0 -11px; pointer-events: none; z-index: 2;
  }
  #crosshair::before, #crosshair::after { content: ""; position: absolute; background: rgba(255,255,255,0.9); box-shadow: 0 0 2px rgba(0,0,0,0.7); }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; margin-left: -1px; }
  #crosshair::after { top: 50%; left: 0; height: 2px; width: 100%; margin-top: -1px; }

  #hotbar {
    position: absolute; left: 50%; bottom: calc(2vh + env(safe-area-inset-bottom));
    transform: translateX(-50%); display: flex; gap: 8px;
    background: rgba(0,0,0,0.32); padding: 8px; border-radius: 14px;
    pointer-events: auto; z-index: 2;
  }
  .slot {
    width: 42px; height: 42px; border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.35); cursor: pointer;
  }
  .slot.selected { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.9) inset; }

  #overlay {
    position: fixed; inset: 0; z-index: 10;
    background: linear-gradient(180deg, rgba(25,40,55,0.82), rgba(8,14,22,0.94));
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center; padding: 24px; pointer-events: auto;
  }
  #overlay h1 { font-size: 34px; margin: 0 0 6px; letter-spacing: 1px; }
  #overlay p { margin: 3px 0; opacity: 0.85; font-size: 14px; max-width: 320px; line-height: 1.5; }
  #startBtn {
    margin-top: 22px; padding: 14px 40px; font-size: 18px; border-radius: 30px;
    border: none; background: #6abe4f; color: #12210c; font-weight: 700;
  }
  #fpsNote { position: fixed; top: calc(6px + env(safe-area-inset-top)); left: 8px; font-size: 10px; color: rgba(255,255,255,0.5); z-index: 2; pointer-events: none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div id="joystickZone" class="zone"></div>
  <div id="lookZone" class="zone"></div>
  <div id="joystickBase"><div id="joystickKnob"></div></div>
  <div id="jumpBtn">&#8593;</div>
  <div id="mineBtn">&#9935;</div>
  <div id="placeBtn">&#9634;</div>
  <div id="crosshair"></div>
  <div id="hotbar"></div>
</div>

<div id="overlay">
  <h1>VOXEL ISLE</h1>
  <p>A little block world you can dig up and build on, right in Safari.</p>
  <p>Left thumb: move &nbsp;•&nbsp; Right thumb: look<br>
     &#9935; mine the block you're facing &nbsp;•&nbsp; &#9634; place a block<br>
     Tap a tile below to pick what you build with.</p>
  <button id="startBtn">Tap to Play</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  "use strict";

  // ---------- prevent Safari zoom/scroll gestures ----------
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); });
  document.addEventListener("gesturechange", function (e) { e.preventDefault(); });
  document.addEventListener("touchmove", function (e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  document.addEventListener("dblclick", function (e) { e.preventDefault(); });

  // ---------- constants ----------
  var WORLD_SIZE = 28;
  var MAX_Y = 48;
  var EYE_HEIGHT = 1.6;
  var PLAYER_R = 0.3;
  var GRAVITY = 24;
  var JUMP_V = 8.4;
  var SPEED = 4.3;
  var LOOK_SENS = 0.0032;
  var INSTANCE_CAP = 6000;

  var BLOCK_COLORS = {
    grass:  ["#6abe4f", "#5aa543", "#7bc95f"],
    dirt:   ["#8a5a35", "#7c4f2e", "#96633c"],
    stone:  ["#8f8f8f", "#7d7d7d", "#9c9c9c"],
    sand:   ["#e3d1a0", "#d9c48f", "#ecdcae"],
    wood:   ["#8a6136", "#6f4c28", "#93693c"],
    leaves: ["#3f8f3a", "#357931", "#4aa042"]
  };
  var HOTBAR = ["grass", "dirt", "stone", "sand", "wood", "leaves"];
  var selectedType = "dirt";

  // ---------- world data ----------
  var blocks = new Map(); // "x,y,z" -> type

  function key(x, y, z) { return x + "," + y + "," + z; }
  function isSolid(x, y, z) {
    return blocks.has(key(Math.floor(x), Math.floor(y), Math.floor(z)));
  }
  function isExposed(x, y, z) {
    return !isSolid(x + 1, y, z) || !isSolid(x - 1, y, z) ||
           !isSolid(x, y + 1, z) || !isSolid(x, y - 1, z) ||
           !isSolid(x, y, z + 1) || !isSolid(x, y, z - 1);
  }

  function hash2(x, z) {
    var s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453123;
    return s - Math.floor(s);
  }
  function smoothNoise(x, z) {
    var xi = Math.floor(x), zi = Math.floor(z);
    var xf = x - xi, zf = z - zi;
    var h00 = hash2(xi, zi), h10 = hash2(xi + 1, zi);
    var h01 = hash2(xi, zi + 1), h11 = hash2(xi + 1, zi + 1);
    var u = xf * xf * (3 - 2 * xf), v = zf * zf * (3 - 2 * zf);
    var nx0 = h00 * (1 - u) + h10 * u;
    var nx1 = h01 * (1 - u) + h11 * u;
    return nx0 * (1 - v) + nx1 * v;
  }
  function terrainHeight(x, z) {
    var n = smoothNoise(x * 0.08, z * 0.08) * 0.6 +
            smoothNoise(x * 0.2, z * 0.2) * 0.3 +
            smoothNoise(x * 0.5, z * 0.5) * 0.1;
    return Math.floor(4 + n * 8);
  }

  function generateWorld() {
    for (var x = 0; x < WORLD_SIZE; x++) {
      for (var z = 0; z < WORLD_SIZE; z++) {
        var h = terrainHeight(x, z);
        for (var y = 0; y < h; y++) {
          var type;
          if (y === h - 1) type = h <= 5 ? "sand" : "grass";
          else if (y >= h - 3) type = "dirt";
          else type = "stone";
          blocks.set(key(x, y, z), type);
        }
      }
    }
    // trees
    for (var i = 0; i < 24; i++) {
      var tx = 2 + Math.floor(Math.random() * (WORLD_SIZE - 4));
      var tz = 2 + Math.floor(Math.random() * (WORLD_SIZE - 4));
      var th = terrainHeight(tx, tz);
      if (th <= 5) continue;
      var trunkH = 3 + Math.floor(Math.random() * 2);
      var ty;
      for (ty = th; ty < th + trunkH; ty++) blocks.set(key(tx, ty, tz), "wood");
      var top = th + trunkH;
      for (var lx = -2; lx <= 2; lx++) {
        for (var lz = -2; lz <= 2; lz++) {
          for (var ly = -1; ly <= 1; ly++) {
            if (Math.abs(lx) === 2 && Math.abs(lz) === 2) continue;
            if (Math.random() < 0.15) continue;
            var bx = tx + lx, by = top + ly, bz = tz + lz;
            var k = key(bx, by, bz);
            if (!blocks.has(k)) blocks.set(k, "leaves");
          }
        }
      }
    }
  }

  // ---------- three.js setup ----------
  var canvas = document.getElementById("game");
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x8fd0ff);
  scene.fog = new THREE.Fog(0x8fd0ff, 14, 24);

  var camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 60);
  camera.rotation.order = "YXZ";

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

  function resize() {
    var w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener("resize", resize);
  if (window.visualViewport) window.visualViewport.addEventListener("resize", resize);

  var hemi = new THREE.HemisphereLight(0xffffff, 0x556633, 0.9);
  scene.add(hemi);
  var sun = new THREE.DirectionalLight(0xffffff, 0.7);
  sun.position.set(0.4, 1, 0.3);
  scene.add(sun);

  function makeTexture(colors) {
    var size = 16;
    var c = document.createElement("canvas");
    c.width = size; c.height = size;
    var ctx = c.getContext("2d");
    for (var y = 0; y < size; y++) {
      for (var x = 0; x < size; x++) {
        ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
        ctx.fillRect(x, y, 1, 1);
      }
    }
    var tex = new THREE.CanvasTexture(c);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    return tex;
  }

  var geo = new THREE.BoxGeometry(1, 1, 1);
  var meshes = {};
  Object.keys(BLOCK_COLORS).forEach(function (type) {
    var mat = new THREE.MeshLambertMaterial({ map: makeTexture(BLOCK_COLORS[type]) });
    var mesh = new THREE.InstancedMesh(geo, mat, INSTANCE_CAP);
    mesh.count = 0;
    scene.add(mesh);
    meshes[type] = mesh;
  });

  var outline = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(1.02, 1.02, 1.02)),
    new THREE.LineBasicMaterial({ color: 0x000000 })
  );
  outline.visible = false;
  scene.add(outline);

  var dummy = new THREE.Object3D();
  function rebuildMeshes() {
    var counts = {};
    Object.keys(meshes).forEach(function (t) { counts[t] = 0; });
    blocks.forEach(function (type, k) {
      var parts = k.split(",");
      var x = +parts[0], y = +parts[1], z = +parts[2];
      if (!isExposed(x, y, z)) return;
      var mesh = meshes[type];
      var i = counts[type]++;
      if (i >= INSTANCE_CAP) return;
      dummy.position.set(x + 0.5, y + 0.5, z + 0.5);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    });
    Object.keys(meshes).forEach(function (t) {
      meshes[t].count = Math.min(counts[t], INSTANCE_CAP);
      meshes[t].instanceMatrix.needsUpdate = true;
    });
  }

  generateWorld();
  rebuildMeshes();

  // ---------- player ----------
  var spawnH = terrainHeight(Math.floor(WORLD_SIZE / 2), Math.floor(WORLD_SIZE / 2));
  var player = {
    x: WORLD_SIZE / 2, y: spawnH + 3, z: WORLD_SIZE / 2,
    yaw: Math.PI, pitch: -0.15, vy: 0, onGround: false
  };

  function collidesBox(cx, cy, cz) {
    var r = PLAYER_R;
    var ys = [cy + 0.05, cy + 0.9, cy + 1.55];
    for (var yi = 0; yi < ys.length; yi++) {
      var y = ys[yi];
      for (var dx = -r; dx <= r; dx += 2 * r) {
        for (var dz = -r; dz <= r; dz += 2 * r) {
          if (isSolid(cx + dx, y, cz + dz)) return true;
        }
      }
    }
    return false;
  }

  function updatePlayer(dt) {
    var yaw = player.yaw;
    var fwd = { x: -Math.sin(yaw), z: -Math.cos(yaw) };
    var right = { x: Math.cos(yaw), z: -Math.sin(yaw) };
    var jx = clamp(joyX + kx(), -1, 1);
    var jy = clamp(joyY + ky(), -1, 1);
    var mx = (right.x * jx + fwd.x * jy) * SPEED * dt;
    var mz = (right.z * jx + fwd.z * jy) * SPEED * dt;

    if (mx !== 0 && !collidesBox(player.x + mx, player.y, player.z)) player.x += mx;
    if (mz !== 0 && !collidesBox(player.x, player.y, player.z + mz)) player.z += mz;

    player.vy -= GRAVITY * dt;
    if (player.vy < -30) player.vy = -30;
    var ny = player.y + player.vy * dt;
    if (collidesBox(player.x, ny, player.z)) {
      if (player.vy < 0) player.onGround = true;
      player.vy = 0;
    } else {
      player.y = ny;
      player.onGround = false;
    }

    if (player.y < -25) {
      player.x = WORLD_SIZE / 2;
      player.z = WORLD_SIZE / 2;
      player.y = terrainHeight(Math.floor(WORLD_SIZE / 2), Math.floor(WORLD_SIZE / 2)) + 3;
      player.vy = 0;
    }
  }

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function tryJump() {
    if (player.onGround) {
      player.vy = JUMP_V;
      player.onGround = false;
      playTone(220, 0.08, "square");
    }
  }

  // ---------- raycast target ----------
  var currentTarget = null;
  var rayDir = new THREE.Vector3();
  function updateTarget() {
    camera.getWorldDirection(rayDir);
    var ox = camera.position.x, oy = camera.position.y, oz = camera.position.z;
    var step = 0.08, maxDist = 6;
    var prev = null, found = null;
    for (var t = 0; t < maxDist; t += step) {
      var px = ox + rayDir.x * t, py = oy + rayDir.y * t, pz = oz + rayDir.z * t;
      var bx = Math.floor(px), by = Math.floor(py), bz = Math.floor(pz);
      if (isSolid(bx, by, bz)) { found = { x: bx, y: by, z: bz }; break; }
      prev = { x: bx, y: by, z: bz };
    }
    if (found) {
      currentTarget = { hit: found, place: prev };
      outline.position.set(found.x + 0.5, found.y + 0.5, found.z + 0.5);
      outline.visible = true;
    } else {
      currentTarget = null;
      outline.visible = false;
    }
  }

  function inWorldBounds(p) {
    return p.x >= 0 && p.x < WORLD_SIZE && p.z >= 0 && p.z < WORLD_SIZE && p.y >= 0 && p.y < MAX_Y;
  }
  function insidePlayer(p) {
    var px = Math.floor(player.x), pz = Math.floor(player.z);
    var py0 = Math.floor(player.y), py1 = Math.floor(player.y + 1.5);
    return p.x === px && p.z === pz && (p.y === py0 || p.y === py1);
  }

  function doMine() {
    if (!currentTarget) return;
    var h = currentTarget.hit;
    if (blocks.delete(key(h.x, h.y, h.z))) {
      rebuildMeshes();
      playTone(120, 0.07, "triangle");
    }
  }
  function doPlace() {
    if (!currentTarget || !currentTarget.place) return;
    var p = currentTarget.place;
    if (!inWorldBounds(p) || insidePlayer(p)) return;
    var k = key(p.x, p.y, p.z);
    if (blocks.has(k)) return;
    blocks.set(k, selectedType);
    rebuildMeshes();
    playTone(300, 0.05, "square");
  }

  // ---------- audio ----------
  var audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }
  function playTone(freq, dur, type) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.stop(audioCtx.currentTime + dur + 0.02);
  }

  // ---------- input: joystick ----------
  var joyX = 0, joyY = 0, joyPointerId = null;
  var joystickZone = document.getElementById("joystickZone");
  var joystickBase = document.getElementById("joystickBase");
  var joystickKnob = document.getElementById("joystickKnob");

  function updateJoystick(clientX, clientY) {
    var rect = joystickBase.getBoundingClientRect();
    var originX = rect.left + rect.width / 2, originY = rect.top + rect.height / 2;
    var maxR = 44;
    var dx = clientX - originX, dz = clientY - originY;
    var dist = Math.hypot(dx, dz);
    if (dist > maxR) { dx = dx / dist * maxR; dz = dz / dist * maxR; }
    joystickKnob.style.transform = "translate(calc(-50% + " + dx + "px), calc(-50% + " + dz + "px))";
    joyX = dx / maxR;
    joyY = -dz / maxR;
  }
  joystickZone.addEventListener("pointerdown", function (e) {
    if (joyPointerId !== null) return;
    joyPointerId = e.pointerId;
    joystickZone.setPointerCapture(e.pointerId);
    updateJoystick(e.clientX, e.clientY);
  });
  joystickZone.addEventListener("pointermove", function (e) {
    if (e.pointerId !== joyPointerId) return;
    updateJoystick(e.clientX, e.clientY);
  });
  function endJoystick(e) {
    if (e.pointerId !== joyPointerId) return;
    joyPointerId = null; joyX = 0; joyY = 0;
    joystickKnob.style.transform = "translate(-50%, -50%)";
  }
  joystickZone.addEventListener("pointerup", endJoystick);
  joystickZone.addEventListener("pointercancel", endJoystick);

  // ---------- input: look ----------
  var lookPointerId = null, lastLookX = 0, lastLookY = 0;
  var lookZone = document.getElementById("lookZone");
  lookZone.addEventListener("pointerdown", function (e) {
    if (lookPointerId !== null) return;
    lookPointerId = e.pointerId;
    lastLookX = e.clientX; lastLookY = e.clientY;
    lookZone.setPointerCapture(e.pointerId);
  });
  lookZone.addEventListener("pointermove", function (e) {
    if (e.pointerId !== lookPointerId) return;
    var dx = e.clientX - lastLookX, dy = e.clientY - lastLookY;
    lastLookX = e.clientX; lastLookY = e.clientY;
    player.yaw -= dx * LOOK_SENS;
    player.pitch -= dy * LOOK_SENS;
    var lim = Math.PI / 2 - 0.05;
    player.pitch = clamp(player.pitch, -lim, lim);
  });
  function endLook(e) { if (e.pointerId === lookPointerId) lookPointerId = null; }
  lookZone.addEventListener("pointerup", endLook);
  lookZone.addEventListener("pointercancel", endLook);

  // ---------- input: buttons ----------
  var jumpBtn = document.getElementById("jumpBtn");
  jumpBtn.addEventListener("pointerdown", function (e) { e.stopPropagation(); tryJump(); });

  var mineBtn = document.getElementById("mineBtn");
  var placeBtn = document.getElementById("placeBtn");
  var mineInterval = null, placeInterval = null;
  mineBtn.addEventListener("pointerdown", function (e) {
    e.stopPropagation(); doMine();
    mineInterval = setInterval(doMine, 260);
  });
  ["pointerup", "pointercancel", "pointerleave"].forEach(function (ev) {
    mineBtn.addEventListener(ev, function () { clearInterval(mineInterval); });
  });
  placeBtn.addEventListener("pointerdown", function (e) {
    e.stopPropagation(); doPlace();
    placeInterval = setInterval(doPlace, 260);
  });
  ["pointerup", "pointercancel", "pointerleave"].forEach(function (ev) {
    placeBtn.addEventListener(ev, function () { clearInterval(placeInterval); });
  });

  // ---------- hotbar ----------
  var hotbarEl = document.getElementById("hotbar");
  HOTBAR.forEach(function (type, idx) {
    var slot = document.createElement("div");
    slot.className = "slot" + (type === selectedType ? " selected" : "");
    slot.style.background = BLOCK_COLORS[type][0];
    slot.addEventListener("pointerdown", function (e) {
      e.stopPropagation();
      selectedType = type;
      Array.prototype.forEach.call(hotbarEl.children, function (c) { c.classList.remove("selected"); });
      slot.classList.add("selected");
    });
    hotbarEl.appendChild(slot);
  });

  // ---------- keyboard (desktop testing) ----------
  var keys = {};
  window.addEventListener("keydown", function (e) {
    keys[e.code] = true;
    if (e.code === "Space") tryJump();
  });
  window.addEventListener("keyup", function (e) { keys[e.code] = false; });
  function kx() { return (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0); }
  function ky() { return (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0); }

  // ---------- start overlay ----------
  document.getElementById("startBtn").addEventListener("pointerdown", function () {
    initAudio();
    document.getElementById("overlay").style.display = "none";
  });

  // ---------- main loop ----------
  var lastTime = performance.now();
  document.addEventListener("visibilitychange", function () { lastTime = performance.now(); });

  function animate(now) {
    requestAnimationFrame(animate);
    var dt = (now - lastTime) / 1000;
    if (dt > 0.05) dt = 0.05;
    lastTime = now;

    updatePlayer(dt);
    camera.position.set(player.x, player.y + EYE_HEIGHT, player.z);
    camera.rotation.x = player.pitch;
    camera.rotation.y = player.yaw;
    updateTarget();

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
